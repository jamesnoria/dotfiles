# Basic settings
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -ga terminal-overrides ',*:Ss=\E[%p1%d q:Se=\E[2 q'
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -g history-limit 5000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g status-position top
set -s escape-time 10
set -g focus-events on

# Mouse support
set -g mouse on

# Vi mode
setw -g mode-keys vi

# Prefix
set -g prefix C-b
set -g prefix2 C-a
bind C-a send-prefix -2

# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# Session management
unbind C-c
bind C-f command-prompt -p find-session 'switch-client -t %%'
bind BTab switch-client -l

# Window splitting
bind - split-window -v -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"

# Pane navigation (vim-style)
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

# Pane resizing
bind -r H resize-pane -L 2
bind -r J resize-pane -D 2
bind -r K resize-pane -U 2
bind -r L resize-pane -R 2

# Pane swapping
bind > swap-pane -D
bind < swap-pane -U

# Window navigation
unbind n
unbind p
bind -r C-h previous-window
bind -r C-l next-window
bind Tab last-window

# Copy mode
bind Enter copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send -X cancel
bind -T copy-mode-vi H send -X start-of-line
bind -T copy-mode-vi L send -X end-of-line

# Copy to system clipboard (OSC 52 for SSH support)
set -g set-clipboard on
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "printf '\033]52;c;%s\a' \"\$(base64 | tr -d '\n')\""

# Buffer management
bind b list-buffers
bind p paste-buffer -p
bind P choose-buffer

# Status bar
set -g status on
set -g status-justify centre
set -g status-left '#{?client_prefix,#[fg=colour0]#[bg=colour226]#[blink],#[fg=colour250]#[bg=colour235]#[bold]} #S #[default]'
set -g status-left-length 50
set -g status-right "#[fg=colour250,bg=colour235,bold] #{continuum_status}"
set -g status-right-length 140
set -g status-style 'bg=colour235,fg=colour250'

# Window status
setw -g window-status-style 'fg=colour243,bg=colour235'
setw -g window-status-format '#[fg=colour243,bg=colour235] #I #W #{?window_zoomed_flag,Z ,} '
setw -g window-status-current-style 'fg=colour111,bg=colour235,bold'
setw -g window-status-current-format '#[fg=colour111,bg=colour235,bold] ● #I #W #{?window_zoomed_flag,Z ,} '
setw -g window-status-separator ' '

# Pane borders
set -g pane-border-style 'fg=colour240'
set -g pane-active-border-style 'fg=colour111'

# TPM plugins
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '5'
set -g @resurrect-capture-pane-contents 'on'
run '~/.tmux/plugins/tpm/tpm'
